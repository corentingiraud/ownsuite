site_name: OwnSuite
site_description: >-
  Self-host La Suite numérique, production-ready, on a single server, for a
  non-profit — K3s, Helmfile, shared SSO, backups included.
# site_url is REQUIRED by the llmstxt plugin and by navigation.instant.
site_url: https://corentingiraud.github.io/ownsuite/
repo_url: https://github.com/corentingiraud/ownsuite
repo_name: corentingiraud/ownsuite
edit_uri: edit/main/docs/
copyright: Documentation released under an open-source license — OwnSuite.

theme:
  name: material
  language: en
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  # La Suite numérique / DSFR brand colours (bleu France + rouge Marianne).
  # The exact hex values live in docs/stylesheets/extra.css (palette: custom).
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search:
      lang: en
  # Publishes /llms.txt (index) and /llms-full.txt (concatenated full text)
  # so AI tools can fetch the whole documentation as a single source.
  - llmstxt:
      markdown_description: >-
        OwnSuite: an open-source, production-ready deployment of La
        Suite numérique on a single server for a non-profit (K3s + Helmfile, shared
        Keycloak SSO, CloudNativePG, pluggable S3 storage, backups and tested
        restore).
      full_output: llms-full.txt
      sections:
        Overview:
          - index.md: Project overview and product vision.
        Get started:
          - get-started/provision.md: Step 0 — provision the server + object storage with Terraform on Scaleway (recommended) or Infomaniak (optional).
          - get-started/bootstrap.md: Step 1 — one-command server bootstrap into a single-node K3s cluster.
          - get-started/install.md: Step 2 — guided installer (suite install), bare server + domain to all-in-HTTPS.
        Operate:
          - operate/users.md: User provisioning with the `suite user` CLI (one Keycloak identity, JIT to all apps).
          - operate/sizing.md: Server sizing — minimum and recommended VPS specs (RAM/CPU/disk) per enabled app.
          - operate/status.md: Health monitoring with `suite status` (node, database, certificates, backups, per-app pods).
          - operate/upgrade.md: Safe upgrades with `suite upgrade` (backup-gated snapshot, diff, apply, health check, auto rollback).
          - operate/backups.md: Off-site backups (CNPG PITR, rclone objects) and the tested restore procedure.
        How it works:
          - understand/overview.md: How it works — the moving parts, in plain terms.
          - understand/platform.md: Under the hood — the shared foundation (HTTPS, database, cache, single sign-on) and the order it comes up in.
          - understand/docs.md: Docs — collaborative documents with single sign-on and file storage.
          - understand/drive.md: Drive — the file manager, on the same shared foundation.
          - understand/grist.md: Grist — spreadsheets that behave like a database; optional, off by default.
          - understand/projects.md: Projects — kanban boards and task management; optional, off by default.
          - understand/messages.md: Mailbox — a full mail provider with webmail; advanced, off by default.
          - understand/decisions.md: Design decisions and their rationale.
        Reference:
          - reference/cli.md: The `suite` CLI — every command and flag (install, user, status, upgrade).
          - reference/configuration.md: Every `OWNSUITE_*` variable, with defaults, and how to choose which apps to deploy.
        Project:
          - project/roadmap.md: Status board (Shipped / Optional / Planned) and the product vision.
          - project/for-ai-agents.md: Conventions for AI agents and the documentation.

nav:
  - Home: index.md
  - Get started:
      - 0. Provision (Terraform): get-started/provision.md
      - 1. Prepare the server: get-started/bootstrap.md
      - 2. Install: get-started/install.md
  - Operate:
      - Users: operate/users.md
      - Server sizing: operate/sizing.md
      - Status & monitoring: operate/status.md
      - Upgrading: operate/upgrade.md
      - Backups & restore: operate/backups.md
  - How it works:
      - Overview: understand/overview.md
      - Under the hood: understand/platform.md
      - Docs: understand/docs.md
      - Drive: understand/drive.md
      - Grist: understand/grist.md
      - Projects: understand/projects.md
      - Mailbox: understand/messages.md
      - Design decisions: understand/decisions.md
  - Reference:
      - suite CLI: reference/cli.md
      - Configuration: reference/configuration.md
  - Project:
      - Status &amp; roadmap: project/roadmap.md
      - For AI agents: project/for-ai-agents.md
