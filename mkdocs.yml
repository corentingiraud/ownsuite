site_name: OwnSuite
site_description: >-
  Self-host La Suite numérique, production-ready, on a single VPS, for a
  non-profit — K3s, Helmfile, shared SSO, backups included.
# site_url is REQUIRED by the llmstxt plugin and by navigation.instant.
site_url: https://corentingiraud.github.io/ownsuite/
repo_url: https://github.com/corentingiraud/ownsuite
repo_name: corentingiraud/ownsuite
edit_uri: edit/main/docs/
copyright: Documentation released under an open-source license — OwnSuite.

theme:
  name: material
  language: en
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search:
      lang: en
  # Publishes /llms.txt (index) and /llms-full.txt (concatenated full text)
  # so AI tools can fetch the whole documentation as a single source.
  - llmstxt:
      markdown_description: >-
        OwnSuite: an open-source, production-ready deployment of La
        Suite numérique on a single VPS for a non-profit (K3s + Helmfile, shared
        Keycloak SSO, CloudNativePG, pluggable S3 storage, backups and tested
        restore).
      full_output: llms-full.txt
      sections:
        Overview:
          - index.md: Project overview and product vision.
        Get started:
          - get-started/bootstrap.md: Step 1 — one-command VPS bootstrap into a single-node K3s cluster.
          - get-started/install.md: Step 2 — guided installer (suite install), bare VPS + domain to all-in-HTTPS.
        Operate:
          - operate/backups.md: Off-site backups (CNPG PITR, rclone objects) and the tested restore procedure.
        Understand the stack:
          - understand/overview.md: The stack and its building blocks.
          - understand/platform.md: Helmfile shared infrastructure (cert-manager, CNPG, Valkey, Keycloak over HTTPS).
          - understand/docs.md: Docs application (SSO, S3 storage, real-time collaboration) wired to the foundation.
          - understand/decisions.md: Architecture Decision Records (ADR) and their rationale.
        Project:
          - project/roadmap.md: Project phases and definition of done.
          - project/for-ai-agents.md: Conventions for AI agents and the documentation.
  # Keep pre-restructure URLs valid after the task-oriented folder move.
  - redirects:
      redirect_maps:
        architecture/overview.md: understand/overview.md
        architecture/decisions.md: understand/decisions.md
        operations/bootstrap.md: get-started/bootstrap.md
        operations/install.md: get-started/install.md
        operations/platform.md: understand/platform.md
        operations/docs.md: understand/docs.md
        operations/backups.md: operate/backups.md
        contributing/for-ai-agents.md: project/for-ai-agents.md
        roadmap.md: project/roadmap.md

nav:
  - Home: index.md
  - Get started:
      - 1. Prepare the VPS: get-started/bootstrap.md
      - 2. Install: get-started/install.md
  - Operate:
      - Backups & restore: operate/backups.md
  - Understand the stack:
      - Architecture: understand/overview.md
      - Shared infrastructure: understand/platform.md
      - Docs application: understand/docs.md
      - Decisions (ADR): understand/decisions.md
  - Project:
      - Roadmap: project/roadmap.md
      - For AI agents: project/for-ai-agents.md
