# Ansible configuration for the OwnSuite server bootstrap.
# Kept self-contained so `make bootstrap` works from the repo root.
[defaults]
inventory = inventory/hosts.yml
roles_path = roles
host_key_checking = True
retry_files_enabled = False
# The community.general.yaml callback was removed in community.general 12.0;
# the builtin default callback with result_format=yaml replaces it.
stdout_callback = default
result_format = yaml
# Show task timing to spot slow steps during a bootstrap.
callbacks_enabled = ansible.posix.profile_tasks
interpreter_python = auto_silent

[ssh_connection]
pipelining = True
