# Ansible configuration for the OwnSuite server bootstrap.
# Kept self-contained so `make bootstrap` works from the repo root.
[defaults]
inventory = inventory/hosts.yml
roles_path = roles
host_key_checking = True
retry_files_enabled = False
stdout_callback = yaml
# Show task timing to spot slow steps during a bootstrap.
callbacks_enabled = ansible.posix.profile_tasks
interpreter_python = auto_silent

[ssh_connection]
pipelining = True
