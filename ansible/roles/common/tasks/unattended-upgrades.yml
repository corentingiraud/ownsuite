---
# Enable automatic installation of Debian security updates.

- name: Install unattended-upgrades
  ansible.builtin.apt:
    name:
      - unattended-upgrades
      - apt-listchanges
    state: present

- name: Enable periodic apt updates and unattended upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      // OwnSuite-managed (Ansible) - changes will be overwritten
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    owner: root
    group: root
    mode: "0644"

- name: Ensure the unattended-upgrades service is enabled
  ansible.builtin.systemd_service:
    name: unattended-upgrades
    enabled: true
    state: started
  failed_when: false
