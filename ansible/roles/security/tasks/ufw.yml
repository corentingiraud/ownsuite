---
# Uncomplicated firewall: default-deny ingress, allow the public ports plus the
# K3s pod/service CIDRs (intra-cluster traffic).

- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Allow inbound on the public TCP ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ firewall_allowed_tcp_ports }}"

- name: Allow inbound SMTP (port 25) for the Mailbox app (ADR-027)
  community.general.ufw:
    rule: allow
    port: "25"
    proto: tcp
  when: enable_mailbox | bool

- name: Allow inbound LiveKit media (TCP 7881 fallback, UDP 7882 mux) for Meet
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
  loop:
    - { port: "7881", proto: tcp }
    - { port: "7882", proto: udp }
  when: enable_meet | bool

- name: Allow inbound LiveKit embedded TURN/TLS (TCP 5349) for Meet
  community.general.ufw:
    rule: allow
    port: "5349"
    proto: tcp
  when: enable_meet_turn | bool

- name: Allow traffic from the K3s pod and service networks
  community.general.ufw:
    rule: allow
    src: "{{ item }}"
  loop:
    - "{{ k3s_pod_cidr }}"
    - "{{ k3s_service_cidr }}"

- name: Set default policies and enable ufw
  community.general.ufw:
    state: enabled
    policy: "{{ item.policy }}"
    direction: "{{ item.direction }}"
  loop:
    - { direction: incoming, policy: deny }
    - { direction: outgoing, policy: allow }
