---
# Uncomplicated firewall: default-deny ingress, allow the public ports plus the
# K3s pod/service CIDRs (intra-cluster traffic).

- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Allow inbound on the public TCP ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ firewall_allowed_tcp_ports }}"

- name: Allow traffic from the K3s pod and service networks
  community.general.ufw:
    rule: allow
    src: "{{ item }}"
  loop:
    - "{{ k3s_pod_cidr }}"
    - "{{ k3s_service_cidr }}"

- name: Set default policies and enable ufw
  community.general.ufw:
    state: enabled
    policy: "{{ item.policy }}"
    direction: "{{ item.direction }}"
  loop:
    - { direction: incoming, policy: deny }
    - { direction: outgoing, policy: allow }
