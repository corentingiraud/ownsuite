---
# Fast per-role scenario: converge common + security inside a systemd-enabled
# Debian container, assert idempotence, then verify with Testinfra.
# The target distro is parameterised so CI can matrix Debian 12 and 13:
#   MOLECULE_IMAGE=geerlingguy/docker-debian13-ansible molecule test
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: ownsuite-${MOLECULE_DISTRO:-debian12}
    image: ${MOLECULE_IMAGE:-geerlingguy/docker-debian12-ansible:latest}
    command: /lib/systemd/systemd
    systemd: true
    privileged: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    pre_build_image: true

provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/ansible/roles"
  config_options:
    defaults:
      callbacks_enabled: ansible.posix.profile_tasks
  inventory:
    group_vars:
      all:
        # No real swap device in a container; exercise the rest of the role.
        common_swap_size_mb: 0
  playbooks:
    converge: converge.yml

scenario:
  # Explicit sequence: converge, prove idempotence, verify, destroy.
  test_sequence:
    - dependency
    - destroy
    - syntax
    - create
    - converge
    - idempotence
    - verify
    - destroy

verifier:
  name: testinfra
