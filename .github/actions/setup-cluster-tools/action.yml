name: Setup cluster CLIs
description: >
  Install the pinned helm / helmfile / kubeconform CLIs (and optionally k3d +
  kubectl for jobs that stand up a cluster) into a cached, PATH-exposed dir.
  Single source of the tool pins — previously copy-pasted across three workflows.

inputs:
  cluster:
    description: "Also install k3d + kubectl (set 'true' for jobs that boot a cluster)."
    default: "false"

runs:
  using: composite
  steps:
    # Cache key is the hash of THIS action file: it carries the version pins below,
    # so any Renovate bump changes the file -> busts the cache. No version is
    # duplicated into the key. `cluster` splits the with/without-k3d caches.
    - name: Restore cluster CLIs
      id: cache
      uses: actions/cache@v6
      with:
        path: ${{ runner.temp }}/cluster-tools-bin
        key: cluster-tools-${{ runner.os }}-cluster-${{ inputs.cluster }}-${{ hashFiles('.github/actions/setup-cluster-tools/action.yml') }}

    - name: Install cluster CLIs (pinned)
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      # Extract in a clean temp dir: the repo root has a `helmfile/` directory,
      # which would collide with `tar x helmfile` (the binary).
      working-directory: ${{ runner.temp }}
      env:
        # Pinned CLI tools (tracked by Renovate via the workflow customManager).
        HELM_VERSION: "v4.2.2" # renovate: datasource=github-releases depName=helm/helm
        HELMFILE_VERSION: "v1.6.0" # renovate: datasource=github-releases depName=helmfile/helmfile
        HELMDIFF_VERSION: "v3.15.10" # renovate: datasource=github-releases depName=databus23/helm-diff
        KUBECONFORM_VERSION: "v0.8.0" # renovate: datasource=github-releases depName=yannh/kubeconform
        K3D_VERSION: "v5.9.0" # renovate: datasource=github-releases depName=k3d-io/k3d
        KUBECTL_VERSION: "v1.36.2" # renovate: datasource=github-releases depName=kubernetes/kubernetes
      run: |
        set -euo pipefail
        bin="${RUNNER_TEMP}/cluster-tools-bin"
        mkdir -p "$bin"
        curl -fsSL "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz" | tar xz
        install -m 0755 linux-amd64/helm "$bin/helm"
        curl -fsSL "https://github.com/helmfile/helmfile/releases/download/${HELMFILE_VERSION}/helmfile_${HELMFILE_VERSION#v}_linux_amd64.tar.gz" | tar xz helmfile
        install -m 0755 helmfile "$bin/helmfile"
        curl -fsSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" | tar xz kubeconform
        install -m 0755 kubeconform "$bin/kubeconform"
        # helm-diff plugin: `suite apply` runs `helmfile apply`/`diff`, which shell out
        # to `helm diff`. The release tarball ships the prebuilt binary, so extract it
        # straight into a cached HELM_PLUGINS dir — no install hook, no provenance step.
        mkdir -p "$bin/helm-plugins"
        curl -fsSL "https://github.com/databus23/helm-diff/releases/download/${HELMDIFF_VERSION}/helm-diff-linux-amd64.tgz" | tar xz -C "$bin/helm-plugins"
        if [ "${{ inputs.cluster }}" = "true" ]; then
          curl -fsSL "https://github.com/k3d-io/k3d/releases/download/${K3D_VERSION}/k3d-linux-amd64" -o k3d
          install -m 0755 k3d "$bin/k3d"
          curl -fsSL "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl" -o kubectl
          install -m 0755 kubectl "$bin/kubectl"
        fi

    # Always (cache hit or miss): expose the bin dir on PATH and point helm/helmfile
    # at the cached helm-diff plugin (HELM_PLUGINS is read by both).
    - name: Add cluster CLIs to PATH
      shell: bash
      run: |
        echo "${RUNNER_TEMP}/cluster-tools-bin" >> "$GITHUB_PATH"
        echo "HELM_PLUGINS=${RUNNER_TEMP}/cluster-tools-bin/helm-plugins" >> "$GITHUB_ENV"
