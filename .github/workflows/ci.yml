name: ci

on:
  push:
    branches: [main]
    paths:
      - "ansible/**"
      - "molecule/**"
      - "suite/**"
      - "tests/**"
      - "Makefile"
      - "requirements-dev.txt"
      - "ruff.toml"
      - ".yamllint"
      - ".ansible-lint"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "ansible/**"
      - "molecule/**"
      - "suite/**"
      - "tests/**"
      - "Makefile"
      - "requirements-dev.txt"
      - "ruff.toml"
      - ".yamllint"
      - ".ansible-lint"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

# Least privilege: these jobs only read the repo (lint + tests, no cluster).
permissions:
  contents: read

# Cancel superseded PR runs (a new push to the same PR kills the in-flight one);
# main / nightly runs (distinct ref) are left to finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: ansible-galaxy collection install -r ansible/requirements.yml
      # Helm/Helmfile static checks run in helmfile-ci.yml (separate paths).
      - run: make lint-ansible
      # `suite` installer (Phase 4): lint + fast unit tests (no cluster).
      - run: make lint-py
      - run: python -m pytest tests -q

  molecule:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian12
            image: "geerlingguy/docker-debian12-ansible:latest"
          - distro: debian13
            image: "geerlingguy/docker-debian13-ansible:latest"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: Install Ansible collections (app + test harness)
        run: |
          ansible-galaxy collection install -r ansible/requirements.yml
          ansible-galaxy collection install -r molecule/requirements.yml
      - name: Run Molecule (default scenario, host-prep roles)
        run: molecule test
        env:
          MOLECULE_DISTRO: ${{ matrix.distro }}
          MOLECULE_IMAGE: ${{ matrix.image }}
