name: helmfile-e2e

# Heavy end-to-end check: stand up a real single-node K3s with k3d, run
# `helmfile sync`, and assert the shared infra is up with Keycloak reachable over
# HTTPS — the machine-checked Phase 1 definition of done. Pulls operators and the
# Keycloak image and waits for a DB migration, so it runs nightly and on changes
# to the Helmfile stack, not on every PR (cost-aware, like bootstrap-e2e.yml).
on:
  schedule:
    - cron: "0 4 * * *"
  push:
    branches: [main]
    paths:
      - "helmfile/**"
      - "suite/**"
      - ".github/workflows/helmfile-e2e.yml"
  pull_request:
    paths:
      - "helmfile/**"
      - "suite/**"
      - ".github/workflows/helmfile-e2e.yml"
  workflow_dispatch:

# Least privilege: e2e only reads the repo (spins up an ephemeral k3d cluster).
permissions:
  contents: read

# Cancel superseded PR runs (a new push to the same PR kills the in-flight one);
# main / nightly runs (distinct ref) are left to finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast, isolated ADR-032 PVC backup/restore round-trip (a single off-site garage +
  # the pvc-backup chart, ~3-5 min). This is the PR gate for backup changes: it proves
  # backup -> wipe -> restore on the real chart WITHOUT the heavy full suite, so a PR
  # gets a meaningful signal in minutes instead of waiting on (and flaking with) the
  # full job below.
  pvc-backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: ./.github/actions/setup-cluster-tools
        with:
          cluster: "true"
      - name: ADR-032 PVC backup/restore (isolated)
        run: make test-pvc-backup

  # The heavy full suite (suite install -> Docs/Drive DoD -> backup/restore): pulls
  # ~15 large images and takes 20-45 min, and is prone to shared-runner flakiness
  # (containerd sandbox collisions, slow pulls). Run it nightly / on main / on demand
  # — NOT as a PR gate. The `pvc-backup` job above covers backup changes on PRs.
  full:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    # Safety net: the full backup->restore cycle runs ~20-25 min; cap well above that
    # so a wedged API/sync (e.g. a starved node) fails in bounded time, never the
    # GitHub default of 6h.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      # pytest drives the DoD asserts; requirements.txt is the suite CLI's runtime
      # deps (PyYAML), needed by `suite apply` -> helmfile sync.
      - run: pip install pytest==9.1.1 -r requirements.txt
      - uses: ./.github/actions/setup-cluster-tools
        with:
          cluster: "true"
      # One installer-provisioned cluster proves both the `suite install` path
      # (ADR-018) and the full platform/restore DoD — no second from-scratch build.
      - name: Full e2e (suite install -> Docs/Drive DoD -> backup/restore)
        run: make test-platform
