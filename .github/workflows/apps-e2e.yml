name: apps-e2e

# Per-app end-to-end boot check for the optional apps (Grist, Projects, messages,
# Docs, Drive). Each app runs on its OWN fresh k3d cluster in a matrix — one app per
# job — so they never compete for RAM (the reason they are kept out of the combined
# helmfile-e2e.yml). Per job: bring up the platform + that one app (every other app
# off), assert it converges, its UI/API is reachable over HTTPS with SSO wired, and an
# app-appropriate read-back (messages: local mail loopback; Docs: SSO create/read-back;
# Drive: JIT /users/me). This is the single source of each app's boot definition of
# done — the full suite (run-e2e.sh) is platform + installer + backup/restore only.
#
# Split like helmfile-e2e.yml (ADR-029):
#   * On a PR that touches an app's chart/values, the `detect` job builds a matrix of
#     ONLY the changed app(s) — a fast, fail-fast gate that gives a meaningful per-app
#     signal in minutes instead of waiting on the nightly.
#   * A shared-harness or workflow change (lib.sh / run-app-e2e.sh / test_apps.py /
#     this file) selects all five, since it can affect any of them.
#   * Nightly + on demand it boots all five regardless — the standing full sweep.
# No `push: [main]` trigger: the PR gate already booted the changed app before merge,
# and the nightly re-proves all five — a per-merge re-run would only add cost.
on:
  schedule:
    - cron: "0 5 * * *"
  pull_request:
    # Per-app chart/values changes drive the per-app gate; shared-harness/workflow
    # changes (matched here too) fan out to all three in the `detect` job below.
    paths:
      - "helmfile/charts/grist/**"
      - "helmfile/charts/projects/**"
      - "helmfile/charts/messages/**"
      # Docs/Drive are upstream charts + a local *-ingress chart + a values file —
      # there is no charts/docs|drive directory, so the ingress chart is the local code.
      - "helmfile/charts/docs-ingress/**"
      - "helmfile/charts/drive-ingress/**"
      - "helmfile/values/grist.yaml.gotmpl"
      - "helmfile/values/projects.yaml.gotmpl"
      - "helmfile/values/messages.yaml.gotmpl"
      - "helmfile/values/docs.yaml.gotmpl"
      - "helmfile/values/drive.yaml.gotmpl"
      - "helmfile/tests/run-app-e2e.sh"
      - "helmfile/tests/lib.sh"
      - "helmfile/tests/test_apps.py"
      - ".github/workflows/apps-e2e.yml"
  workflow_dispatch:

# Least privilege: e2e only reads the repo (spins up an ephemeral k3d cluster).
permissions:
  contents: read

# Cancel superseded PR runs (a new push to the same PR kills the in-flight one);
# nightly / dispatch runs (distinct ref) are left to finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Decide which apps this run must boot. For a PR, diff against the base and keep
  # only the apps whose chart/values changed; a shared-harness/workflow change selects
  # all five. Any other event (schedule / dispatch) boots all five. GitHub `paths:`
  # filters gate the WORKFLOW but cannot map "changed app -> only that matrix entry",
  # so this job does the mapping and emits a JSON matrix.
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      apps: ${{ steps.pick.outputs.apps }}
    steps:
      - uses: actions/checkout@v7
        with:
          # Need the base commit to diff a PR's changed files.
          fetch-depth: 0
      - id: pick
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          all='["grist","projects","messages","docs","drive"]'
          if [ "$EVENT" != "pull_request" ]; then
            echo "apps=$all" >> "$GITHUB_OUTPUT"; exit 0
          fi
          changed="$(git diff --name-only "$BASE_SHA"...HEAD)"
          # A shared-harness or workflow change can affect any app -> run all five.
          if grep -qE '^(helmfile/tests/(run-app-e2e\.sh|lib\.sh|test_apps\.py)|\.github/workflows/apps-e2e\.yml)$' <<<"$changed"; then
            echo "apps=$all" >> "$GITHUB_OUTPUT"; exit 0
          fi
          picked=()
          for app in grist projects messages docs drive; do
            # Grist/Projects/messages own a charts/<app>/ dir; Docs/Drive have no such
            # dir — their only local chart is charts/<app>-ingress/ (upstream chart +
            # values file otherwise). Match the right one per app.
            case "$app" in
              docs|drive) chart="charts/$app-ingress/" ;;
              *) chart="charts/$app/" ;;
            esac
            if grep -qE "^helmfile/($chart|values/$app\.yaml\.gotmpl$)" <<<"$changed"; then
              picked+=("$app")
            fi
          done
          # Empty only if the diff missed a path the `paths:` filter matched (e.g. a
          # rename); skip the matrix rather than emit a bogus entry.
          if [ ${#picked[@]} -eq 0 ]; then
            echo "apps=[]" >> "$GITHUB_OUTPUT"; exit 0
          fi
          apps="$(printf '%s\n' "${picked[@]}" | jq -R . | jq -s -c .)"
          echo "apps=$apps" >> "$GITHUB_OUTPUT"

  app-e2e:
    needs: detect
    if: needs.detect.outputs.apps != '[]'
    runs-on: ubuntu-latest
    # One app on one cluster (no backup/restore cycle), so ~15-20 min; cap above that
    # so a wedged API/sync fails in bounded time, never the GitHub default of 6h. The
    # in-script provision_with_watchdog turns most failures into ~15s fail-fast.
    timeout-minutes: 35
    strategy:
      # One app's failure must not cancel the others — each is independent.
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.detect.outputs.apps) }}
    name: app-e2e (${{ matrix.app }})
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: pip install pytest==9.1.1
      - uses: ./.github/actions/setup-cluster-tools
        with:
          cluster: "true"
      - name: Boot ${{ matrix.app }} and assert its definition of done
        run: make test-app APP=${{ matrix.app }}
