name: helmfile-ci

# Fast static checks for the Helmfile stack: helm lint on the local charts, a
# full `helmfile template` render, and kubeconform schema validation (incl. the
# cert-manager / CloudNativePG CRDs). Runs on every change under helmfile/.
on:
  push:
    branches: [main]
    paths:
      - "helmfile/**"
      - "Makefile"
      - ".github/workflows/helmfile-ci.yml"
  pull_request:
    paths:
      - "helmfile/**"
      - "Makefile"
      - ".github/workflows/helmfile-ci.yml"
  workflow_dispatch:

# Least privilege: static checks only read the repo.
permissions:
  contents: read

# Cancel superseded PR runs (a new push to the same PR kills the in-flight one);
# main / nightly runs (distinct ref) are left to finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # No cluster needed for static checks -> helm/helmfile/kubeconform only.
      - uses: ./.github/actions/setup-cluster-tools
      - name: Helm/Helmfile static checks
        run: make lint-helm
