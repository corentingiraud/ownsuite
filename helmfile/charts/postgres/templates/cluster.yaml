---
# Single-instance PostgreSQL cluster (ADR-004). Each app gets a login role whose
# password is taken from the basic-auth Secret generated by platform-configuration.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Values.cluster.name }}
spec:
  instances: {{ .Values.cluster.instances }}
  {{- with .Values.cluster.imageName }}
  imageName: {{ . | quote }}
  {{- end }}
  storage:
    size: {{ .Values.cluster.storage.size | quote }}
    {{- with .Values.cluster.storage.storageClass }}
    storageClass: {{ . | quote }}
    {{- end }}
  {{- if .Values.backup.enabled }}
  # WAL archiver + base-backup plugin (ADR-006, ADR-017). serverName defaults to the
  # cluster name, so backups live under s3://<bucket>/<clusterName>/. After a recovery
  # the timeline ID bumps, so resuming archiving to the same store does not collide.
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: {{ .Values.backup.objectStoreName | quote }}
  {{- end }}
  {{- if .Values.restore.enabled }}
  # Recovery bootstrap (ADR-006, ADR-017): rebuild a clean cluster from the off-site
  # backups instead of an empty init. Recovers the whole instance — both the
  # `keycloak` and `docs` databases — so Keycloak realm + users and the Docs document
  # come back (Keycloak DR is PITR-only). Run by `make restore` on a clean cluster.
  bootstrap:
    recovery:
      source: backup-source
  externalClusters:
    - name: backup-source
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: {{ .Values.backup.objectStoreName | quote }}
          serverName: {{ .Values.restore.sourceServerName | quote }}
  {{- end }}
  managed:
    roles:
      {{- range .Values.databases }}
      - name: {{ .name | quote }}
        ensure: present
        login: true
        superuser: false
        passwordSecret:
          name: {{ .secretName | quote }}
      {{- end }}
