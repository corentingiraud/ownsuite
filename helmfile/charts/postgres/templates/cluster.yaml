---
# Single-instance PostgreSQL cluster (ADR-004). Each app gets a login role whose
# password is taken from the basic-auth Secret generated by platform-configuration.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Values.cluster.name }}
spec:
  instances: {{ .Values.cluster.instances }}
  {{- with .Values.cluster.imageName }}
  imageName: {{ . | quote }}
  {{- end }}
  storage:
    size: {{ .Values.cluster.storage.size | quote }}
    {{- with .Values.cluster.storage.storageClass }}
    storageClass: {{ . | quote }}
    {{- end }}
  managed:
    roles:
      {{- range .Values.databases }}
      - name: {{ .name | quote }}
        ensure: present
        login: true
        superuser: false
        passwordSecret:
          name: {{ .secretName | quote }}
      {{- end }}
