{{- /* One declarative Database CR per app (ADR-004, 1 db/app). The owner role is
       created via the Cluster's managed.roles above. */ -}}
{{- range .Values.databases }}
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: {{ .name }}
spec:
  name: {{ .name }}
  owner: {{ .name }}
  # Disabling an app drops its Database CR from the render; retain (CNPG's default,
  # pinned here) keeps the actual database so re-enabling finds the data intact.
  databaseReclaimPolicy: retain
  cluster:
    name: {{ $.Values.cluster.name }}
{{- end }}
