{{- /*
Provision the SabreDAV schema as a pre-install/pre-upgrade Helm hook (ADR-043), the
sibling of calendars-migrate. SabreDAV's tables (principals, propertystorage, calendars,
...) live in the `sabre` schema of the shared `calendars` DB, but the published caldav
image's entrypoint only runs apache2 — it never creates them, so PROPFINDs 500 with
`relation "principals" does not exist`. Upstream provisions them out-of-band by running
init-database.sh inside the caldav image (compose does `init-database.sh || true &&
apache2-foreground`; there is no Django/PHP migrate command for it). The script is
idempotent — CREATE SCHEMA IF NOT EXISTS, load DDL only when tables are absent, then
apply sql/migrations/* — so it's safe to re-run every sync. It reuses the caldav
component's own env (PG* + CALDAV_DB_SCHEMA=sabre + PGPASSWORD), staying in lockstep.
*/}}
{{- $caldav := .Values.components.caldav }}
apiVersion: batch/v1
kind: Job
metadata:
  name: calendars-caldav-migrate
  labels:
    app.kubernetes.io/name: calendars
    app.kubernetes.io/component: caldav-migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: calendars
        app.kubernetes.io/component: caldav-migrate
    spec:
      restartPolicy: OnFailure
      {{- with $.Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: caldav-migrate
          image: "{{ $.Values.image.repository }}-{{ $caldav.imageSuffix }}:{{ $caldav.imageTag | default $.Values.image.tag }}"
          command: ["/usr/local/bin/init-database.sh"]
          env:
            {{- range $k, $v := $caldav.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- range $caldav.secretEnv }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secretName }}
                  key: {{ .secretKey }}
            {{- end }}
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
