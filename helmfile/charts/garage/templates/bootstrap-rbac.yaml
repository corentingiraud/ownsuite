{{- /* Least-privilege access for the bootstrap Job: read the garage pods and exec
       the Garage CLI inside them, in this namespace only. */}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: garage-bootstrap
  labels:
    app.kubernetes.io/name: garage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: garage-bootstrap
  labels:
    app.kubernetes.io/name: garage
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: garage-bootstrap
  labels:
    app.kubernetes.io/name: garage
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: garage-bootstrap
subjects:
  - kind: ServiceAccount
    name: garage-bootstrap
