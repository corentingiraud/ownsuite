{{- /*
Garage configuration (ADR-015). Committed-safe: it holds NO secrets. The RPC
secret and the admin-API token are injected at runtime via the GARAGE_RPC_SECRET
and GARAGE_ADMIN_TOKEN environment variables (from the garage-credentials Secret),
so nothing secret ever lands in this ConfigMap or the repo. Single node, so
replication_factor = 1 and rpc_public_addr points at the node itself.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.name }}-config
  labels:
    app.kubernetes.io/name: {{ .Values.name }}
    app.kubernetes.io/managed-by: helm
data:
  garage.toml: |
    metadata_dir = "/var/lib/garage/meta"
    data_dir     = "/var/lib/garage/data"
    db_engine    = "lmdb"
    metadata_auto_snapshot_interval = "6h"

    replication_factor = {{ .Values.replicationFactor }}

    # Bind IPv4 (0.0.0.0), not IPv6 ([::]): K3s pods are IPv4 and the kubelet TCP
    # readiness probe dials the IPv4 pod IP — an IPv6-only socket would refuse it
    # and the pod would never become Ready.
    rpc_bind_addr   = "0.0.0.0:3901"
    rpc_public_addr = "127.0.0.1:3901"

    [s3_api]
    s3_region     = "{{ .Values.region }}"
    api_bind_addr = "0.0.0.0:3900"
    root_domain   = ".s3.garage.local"

    [admin]
    api_bind_addr = "0.0.0.0:3903"
    # admin_token comes from $GARAGE_ADMIN_TOKEN; metrics endpoint left tokenless.
