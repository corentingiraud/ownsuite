{{- /*
Single-node Garage server (ADR-015). The RPC secret and admin token are injected
from the garage-credentials Secret as env vars (Garage reads GARAGE_RPC_SECRET /
GARAGE_ADMIN_TOKEN), keeping garage.toml secret-free. Readiness is a TCP check on
the S3 API port: the process listens as soon as it starts, BEFORE the cluster
layout exists — so `helm --wait` does not deadlock against the bootstrap Job that
assigns the layout afterwards.
*/}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: garage
  labels:
    app.kubernetes.io/name: garage
spec:
  replicas: 1
  serviceName: garage
  selector:
    matchLabels:
      app.kubernetes.io/name: garage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: garage
      annotations:
        # Roll the pod when the rendered config changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: garage
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          # The image has no entrypoint (Cmd is "/garage server"); set the binary
          # path explicitly so `args` doesn't replace the whole command.
          command: ["/garage"]
          args: ["server"]
          ports:
            - name: s3-api
              containerPort: 3900
            - name: rpc
              containerPort: 3901
            - name: admin
              containerPort: 3903
          env:
            - name: GARAGE_RPC_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentialsSecret }}
                  key: rpcSecret
            - name: GARAGE_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentialsSecret }}
                  key: adminToken
          volumeMounts:
            - name: config
              mountPath: /etc/garage.toml
              subPath: garage.toml
            - name: meta
              mountPath: /var/lib/garage/meta
            - name: data
              mountPath: /var/lib/garage/data
          readinessProbe:
            tcpSocket:
              port: s3-api
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: rpc
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: garage-config
  volumeClaimTemplates:
    - metadata:
        name: meta
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.storage.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.storage.meta | quote }}
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.storage.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.storage.data | quote }}
