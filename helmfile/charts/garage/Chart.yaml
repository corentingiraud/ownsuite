apiVersion: v2
name: garage
description: >-
  Single-node Garage object store (ADR-015) for OwnSuite. Deploys Garage as a
  StatefulSet, exposes its S3 + admin APIs, and bootstraps the cluster layout, a
  deterministic S3 access key, and the app bucket. Deployed only in `garage`
  object-storage mode; production defaults to an external S3 (ADR-003).
type: application
version: 0.1.0
# The Garage image tag is pinned in helmfile/versions/versions.yaml, not here.
appVersion: "2.3.0"
