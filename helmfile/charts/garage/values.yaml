---
# Defaults are overridden by Helmfile (values/garage.yaml.gotmpl). Listed here so
# `helm lint` / `helm template` can render the chart standalone.

# Resource name + selector value, so a second instance (the off-site backup store,
# `garage-backup`) can run in the same namespace without colliding (ADR-006/ADR-017).
name: garage

image:
  repository: dxflrs/garage
  tag: v2.3.0

# Image used by the bootstrap Job to `kubectl exec` the Garage CLI into the pod.
# Alpine-based (ships a shell); kubectl exec/get are version-stable across skew.
bootstrapImage:
  repository: alpine/kubectl
  tag: "1.36.2"

# Single node: no replication.
replicationFactor: 1
# S3 region advertised by the API and used when assigning the layout zone.
region: garage

storage:
  meta: 1Gi
  data: 10Gi
  # Empty => cluster default StorageClass (local-path on K3s).
  storageClass: ""

# Bucket created at bootstrap and granted to the imported app key.
bucket: docs-media-storage
# Name of the imported S3 key inside Garage (the credentials come from s3Secret).
keyName: docs

# Secrets produced by platform-configuration.
credentialsSecret: garage-credentials  # rpcSecret, adminToken
s3Secret: s3-credentials               # holds the access key id + secret access key
# Key names inside `s3Secret` for the access key id / secret (the primary store uses
# the AWS_* keys; the off-site backup store imports the backup-s3-credentials keys).
s3SecretKeys:
  accessKeyId: AWS_S3_ACCESS_KEY_ID
  secretAccessKey: AWS_S3_SECRET_ACCESS_KEY

# Lightweight by design (Rust); bump the limit if media throughput grows.
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 512Mi
