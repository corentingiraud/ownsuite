{{- /*
Upsert payload for the kcadm Job (ADR-020): the reconciliation script plus one
ClientRepresentation per app (no secret — the secret is injected at runtime from
the keycloak-oidc-clients Secret via `-s secret=...`). The representation mirrors
the realm-import ConfigMap (platform-configuration); the Job runs last and is
authoritative, so the two converging on the same desired state is by design.
*/ -}}
{{- $root := . -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-config-upsert
  labels:
    app.kubernetes.io/name: keycloak-config
    app.kubernetes.io/managed-by: keycloak-config
data:
  upsert.sh: |
    #!/bin/sh
    # Idempotent: create-or-update each OIDC client on the realm. Safe to re-run on
    # every sync (this is a post-install/post-upgrade hook). kcadm writes its session
    # to --config (/tmp is writable for the non-root Keycloak user, $HOME may not be).
    set -eu
    KCADM=/opt/keycloak/bin/kcadm.sh
    CONFIG=/tmp/kcadm.config
    echo "Reconciling OIDC clients in realm '${KC_REALM}' at ${KC_SERVER}"

    # Keycloak may still be finishing its boot/realm-import; wait for the admin API.
    i=0
    until "$KCADM" config credentials --config "$CONFIG" --server "$KC_SERVER" \
          --realm master --user "$KC_ADMIN_USER" --password "$KC_ADMIN_PASSWORD" \
          >/dev/null 2>&1; do
      i=$((i + 1))
      if [ "$i" -gt 60 ]; then echo "Keycloak admin API not ready in time" >&2; exit 1; fi
      echo "  waiting for Keycloak admin API (${i})..."
      sleep 5
    done

    found=0
    for rep in /config/*.client.json; do
      [ -e "$rep" ] || continue
      found=1
      clientId=$(basename "$rep" .client.json)
      secret=""
      [ -f "/oidc-secrets/${clientId}" ] && secret=$(cat "/oidc-secrets/${clientId}")
      existing=$("$KCADM" get clients --config "$CONFIG" -r "$KC_REALM" \
        -q clientId="$clientId" --fields id 2>/dev/null \
        | sed -nE 's/.*"id"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/p' | head -1)
      if [ -n "$existing" ]; then
        echo "  updating client '${clientId}' (${existing})"
        "$KCADM" update "clients/${existing}" --config "$CONFIG" -r "$KC_REALM" \
          -f "$rep" -s secret="$secret"
      else
        echo "  creating client '${clientId}'"
        "$KCADM" create clients --config "$CONFIG" -r "$KC_REALM" \
          -f "$rep" -s secret="$secret"
      fi
    done
    [ "$found" = "1" ] || echo "  no OIDC clients configured; nothing to do"
    echo "OIDC client reconciliation complete."
    {{- if .Values.email.configured }}

    # Realm SMTP relay for account emails (verification, password reset). Uses the
    # shared platform relay account (SMTP_USER/SMTP_PASSWORD from the email-relay
    # Secret); STARTTLS on the relay port. Idempotent — re-set on every sync.
    echo "Configuring realm SMTP relay"
    "$KCADM" update "realms/${KC_REALM}" --config "$CONFIG" \
      -s 'smtpServer.host={{ .Values.email.host }}' \
      -s 'smtpServer.port={{ .Values.email.port }}' \
      -s 'smtpServer.from={{ .Values.email.from }}' \
      -s 'smtpServer.starttls=true' \
      -s 'smtpServer.ssl=false' \
      -s 'smtpServer.auth=true' \
      -s "smtpServer.user=${SMTP_USER}" \
      -s "smtpServer.password=${SMTP_PASSWORD}"
    echo "Realm SMTP configured."
    {{- end }}
{{- /* UserInfo is kept UNSIGNED (user.info.response.signature.alg=""). RS256 makes Keycloak
       return a signed JWT that Grist's openid-client cannot parse ("not valid JSON"); unsigned
       is the OIDC default every app here expects. Empty (not omitted) so a re-upsert clears any
       previously-set RS256 on existing clients. */}}
{{- range .Values.clients }}
  {{- /* redirectHost overrides the callback host when the app's OIDC client is not on
         <clientId>.{domain} (e.g. Tchap's client is MAS at account.{domain}). Mirrors
         the realm-import ConfigMap so the upsert Job converges on the same client. */}}
  {{- $host := printf "%s.%s" (.redirectHost | default .clientId) $root.Values.domain }}
  {{- $rep := dict
      "clientId" .clientId
      "name" .clientId
      "enabled" true
      "protocol" "openid-connect"
      "publicClient" false
      "clientAuthenticatorType" "client-secret"
      "standardFlowEnabled" true
      "implicitFlowEnabled" false
      "directAccessGrantsEnabled" (.directAccessGrants | default false)
      "serviceAccountsEnabled" false
      "frontchannelLogout" true
      "redirectUris" (list (printf "https://%s/*" $host))
      "webOrigins" (list (printf "https://%s" $host))
      "defaultClientScopes" (list "web-origins" "acr" "roles" "profile" "email")
      "attributes" (dict
          "post.logout.redirect.uris" (printf "https://%s/*" $host)
          "user.info.response.signature.alg" "")
  }}
  {{- /* Optional hardcoded org claim in userinfo (issue #106) — mirrors the realm-import
         ConfigMap so the upsert Job converges on the same client. Only Calendars sets it.
         kcadm applies protocolMappers from the client representation on create/update. */}}
  {{- with .orgClaim }}
    {{- $mapper := dict
        "name" (printf "%s-organization" $rep.clientId)
        "protocol" "openid-connect"
        "protocolMapper" "oidc-hardcoded-claim-mapper"
        "config" (dict
            "claim.name" .name
            "claim.value" .value
            "jsonType.label" "String"
            "userinfo.token.claim" "true"
            "id.token.claim" "true"
            "access.token.claim" "false") }}
    {{- $_ := set $rep "protocolMappers" (list $mapper) }}
  {{- end }}
  {{ .clientId }}.client.json: |
{{ toPrettyJson $rep | indent 4 }}
{{- end }}
