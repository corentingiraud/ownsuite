{{- if .Values.ingress.enabled }}
{{- /* Plain Traefik ingress to the Grist service. Grist serves its own UI, API and
       the collaboration WebSocket on one port — Traefik proxies WebSockets natively
       (ADR-016), so no special annotation is needed. cert-manager issues grist-tls. */}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grist
  labels:
    app.kubernetes.io/name: grist
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grist
                port:
                  name: http
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName | quote }}
  {{- end }}
{{- end }}
