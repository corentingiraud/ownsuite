{{- /* Durable home for Grist's document SQLite files (/persist). Single-instance,
       so ReadWriteOnce. NOT off-site-backed yet — see ADR-024 (same gap as Drive's
       bucket); object-backup copies a single bucket today. */}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grist-persist
  labels:
    app.kubernetes.io/name: grist
  annotations:
    # Survive `helm uninstall` (apply-prune / destroy): documents must never ride
    # the release lifecycle. Re-enabling Grist re-binds the same PVC.
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence.size | quote }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass | quote }}
  {{- end }}
