---
# Defaults are overridden by Helmfile (values/messages.yaml.gotmpl). Listed here so
# `helm lint` / `helm template` can render the chart standalone (ADR-026). The real
# env/secretEnv (DB, OIDC, S3, relay, DKIM, ...) are filled in by the gotmpl.

# Image tag is NOT pinned here. The single source of truth is
# helmfile/versions/versions.yaml (imageVersions.messages); Helmfile injects it.
# Each component image is "{repository}-{imageSuffix}:{tag}", e.g.
# ghcr.io/suitenumerique/messages-backend:0.8.0.
image:
  repository: ghcr.io/suitenumerique/messages
  tag: ""

# The mail domain to seed (with oidc_autojoin, so a mailbox is created on first OIDC
# login — the JIT path the DoD relies on). Empty here so the seed Job is skipped for
# standalone `helm template`; Helmfile sets it to the base domain.
mailDomain: ""

# When Calendars is also enabled (issue #108), a post-install Job upserts the api_key
# Channel that Calendars uses to read mailboxes over the provisioning API. Off here so
# standalone `helm template` skips it; the Helmfile gotmpl turns it on and points at the
# shared secret (calendars-secrets) that holds the matching channel id + api_key.
calendarsProvisioning:
  enabled: false
  secretName: calendars-secrets

# Single instance per component (single node, no horizontal scale).
replicas: 1

# messages' images run as a non-root uid; fsGroup is harmless and matches the
# other app charts. No volumes are mounted (state is external), so this is mostly
# future-proofing.
podSecurityContext:
  fsGroup: 1000

# Shared resource fallback; every component below sets its own `resources` (the
# backend/worker are heavier than the Postfix MTAs, so they are tuned separately).
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 1Gi

# One Deployment per entry. Fields:
#   imageSuffix  the published image (messages-<suffix>); the worker reuses backend.
#   command      overrides the image CMD (worker only).
#   port         container port (omit for the worker); portName names it.
#   portName     "http" (default) or "smtp" for the MTAs.
#   probe        health check: {type: http|tcp, path, startupFailureThreshold, ...};
#                drives startup + readiness + liveness (the deployment template).
#   resources    per-component requests/limits (overrides the shared fallback).
#   service      expose it: {type: ClusterIP|LoadBalancer, port}.
#   env          plain env (filled by the gotmpl).
#   secretEnv    list of {name, secretName, secretKey} (filled by the gotmpl).
components:
  backend:
    imageSuffix: backend
    port: 8000
    # TCP, not HTTP: a kube httpGet probe sends Host: <pod-IP>, which Django rejects
    # via ALLOWED_HOSTS (400). gunicorn accepts the connection once booted, and the
    # pre-upgrade migrate hook has already run, so TCP-ready is a sound signal (the
    # same reasoning as the projects chart, ADR-025).
    probe:
      type: tcp
    # Django + gunicorn: the heaviest component.
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        memory: 1Gi
    service:
      type: ClusterIP
      port: 8000
    env: {}
    secretEnv: []
  worker:
    imageSuffix: backend
    command: ["python", "worker.py", "--loglevel=INFO"]
    # Background task runner — same image as backend, lighter steady-state.
    resources:
      requests:
        cpu: 100m
        memory: 384Mi
      limits:
        memory: 768Mi
    env: {}
    secretEnv: []
  frontend:
    imageSuffix: frontend
    port: 8080
    probe:
      type: http
      path: /__lbheartbeat__
    # Static webmail server (Node) — light.
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    service:
      type: ClusterIP
      port: 8080
    env: {}
    secretEnv: []
  mta-in:
    imageSuffix: mta-in
    port: 25
    portName: smtp
    probe:
      type: tcp
    # Postfix: lightweight relay process.
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
    # Inbound SMTP from the internet — ServiceLB binds host port 25 (ADR-027).
    service:
      type: LoadBalancer
      port: 25
    env: {}
    secretEnv: []
  mta-out:
    imageSuffix: mta-out
    port: 587
    portName: smtp
    # Work around three gaps in the 0.8.0 image so postfix actually starts:
    #   1. The entrypoint writes the SASL db to /var/spool/postfix/etc/sasldb2 but the
    #      Dockerfile never creates that dir, so saslpasswd2 fails ("generic failure").
    #   2. The queue dirs are created owned by root, so `postfix start-fg` aborts on
    #      mis-owned /var/spool/postfix/{private,public}; `postfix set-permissions`
    #      fixes the ownership before the daemon starts.
    #   3. set-permissions chowns postfix's manpages too, but the slim image strips
    #      them, so chown exits non-zero and (under sh's &&) aborts before the
    #      entrypoint. The queue-dir chowns it cares about still happen; `|| true`
    #      swallows only the cosmetic manpage failure. A genuinely broken permission
    #      set still fails fast at `postfix start-fg`, which validates them.
    #   4. main.cf is rendered from a Jinja template (/app/etc/main.cf.j2) whose
    #      relay block is indented one space. Postfix treats a whitespace-led line
    #      as a CONTINUATION, so the smtp_sasl_* directives get folded into the
    #      relayhost value: SASL to the relay never enables (TEM answers "502
    #      authenticate first") and relayhost is garbage. De-indent those lines in
    #      the template before the entrypoint renders main.cf from it.
    # Create the dir, fix permissions, de-indent the relay block, then exec the entrypoint.
    # drop each once upstream ships the fixes (mkdir+set-permissions;
    # de-indented main.cf.j2 — PR suitenumerique/messages#733).
    command:
      - sh
      - -c
      - mkdir -p /var/spool/postfix/etc && { postfix set-permissions || true; } && sed -i 's/^ *\(smtp_sasl[a-z_]* =\)/\1/' /app/etc/main.cf.j2 && exec /usr/local/bin/entrypoint.sh
    probe:
      type: tcp
    # Postfix: lightweight relay process.
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
    # ClusterIP only: the worker submits outbound mail here; it never faces the net.
    service:
      type: ClusterIP
      port: 587
    env: {}
    secretEnv: []

# Webmail Ingress (Traefik HTTPS) -> the frontend Service. cert-manager issues the cert.
ingress:
  enabled: true
  className: traefik
  host: messages.localhost
  annotations: {}
  service:
    name: messages-frontend
    port: 8080
  tls:
    enabled: true
    secretName: messages-tls
