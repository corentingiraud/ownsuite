{{- /*
The messages backend does NOT migrate on start, so run `manage.py migrate` as a
pre-install/pre-upgrade Helm hook (ADR-026). With `helm --wait` the release blocks
until migrations apply; `before-hook-creation` lets it re-run every sync (a completed
Job is immutable) and migrate is idempotent. It runs the backend image with the
backend's own env (DB + Django config), so it stays in lockstep with the app.
*/}}
{{- $backend := .Values.components.backend }}
apiVersion: batch/v1
kind: Job
metadata:
  name: messages-migrate
  labels:
    app.kubernetes.io/name: messages
    app.kubernetes.io/component: migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: messages
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      {{- with $.Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: "{{ $.Values.image.repository }}-{{ $backend.imageSuffix }}:{{ $.Values.image.tag }}"
          command: ["python", "manage.py", "migrate", "--noinput"]
          env:
            {{- range $k, $v := $backend.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- range $backend.secretEnv }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secretName }}
                  key: {{ .secretKey }}
            {{- end }}
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
