{{- /*
All shared credentials are derived from the single seed (ADR-012) and emitted as
Kubernetes Secrets in the workloads namespace. Consumers reference these by name
(secretKeyRef / existingSecret) instead of re-deriving, so derivation lives in
exactly one place.
*/}}
{{- $labels := dict "app.kubernetes.io/managed-by" "platform-configuration" }}
{{- range .Values.databases }}
---
# Per-database owner credentials (basic-auth: username + derived password).
apiVersion: v1
kind: Secret
metadata:
  name: {{ .secretName }}
  labels:
    {{- toYaml $labels | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ .name | quote }}
  password: {{ include "ownsuite.getSecret" (dict "root" $ "id" (printf "%s-db" .name)) | quote }}
{{- end }}
---
# Keycloak bootstrap admin (master realm).
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin
  labels:
    {{- toYaml $labels | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.keycloak.adminUser | quote }}
  password: {{ include "ownsuite.getSecret" (dict "root" $ "id" "keycloak-admin") | quote }}
{{- if .Values.keycloak.clients }}
---
# Per-app OIDC client secrets (ADR-012), one key per clientId — each derived from
# the same `<clientId>-oidc` id the realm import and the app already use. Lets the
# kcadm upsert Job (keycloak-config chart, ADR-016/ADR-020) reconcile an already
# imported realm by secretKeyRef, so derivation stays in this one place.
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-oidc-clients
  labels:
    {{- toYaml $labels | nindent 4 }}
type: Opaque
stringData:
  {{- range .Values.keycloak.clients }}
  {{ .clientId }}: {{ include "ownsuite.getSecret" (dict "root" $ "id" (printf "%s-oidc" .clientId)) | quote }}
  {{- end }}
{{- end }}
---
# Valkey password — exposed as a plain credential (for apps, Phase 2) and as a
# valkey.conf snippet mounted by the Valkey chart, so the password never lands in
# a ConfigMap or the repo.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.valkey.secretName }}
  labels:
    {{- toYaml $labels | nindent 4 }}
type: Opaque
stringData:
  password: {{ include "ownsuite.getSecret" (dict "root" $ "id" "valkey") | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.valkey.configSecretName }}
  labels:
    {{- toYaml $labels | nindent 4 }}
type: Opaque
stringData:
  ownsuite.conf: |
    requirepass {{ include "ownsuite.getSecret" (dict "root" $ "id" "valkey") }}
---
# Object storage credentials — the pluggable seam (ADR-003). Derived even though
# no app consumes them in Phase 1.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.objectStorage.secretName }}
  labels:
    {{- toYaml $labels | nindent 4 }}
type: Opaque
stringData:
  AWS_S3_ACCESS_KEY_ID: {{ include "ownsuite.getSecret" (dict "root" $ "id" "s3-access" "length" 20) | quote }}
  AWS_S3_SECRET_ACCESS_KEY: {{ include "ownsuite.getSecret" (dict "root" $ "id" "s3-secret" "length" 40) | quote }}
  AWS_S3_ENDPOINT_URL: {{ .Values.objectStorage.endpoint | quote }}
  AWS_S3_REGION_NAME: {{ .Values.objectStorage.region | quote }}
{{- if .Values.backup.enabled }}
---
# Off-site backup S3 credentials + the rclone client-side encryption passphrase
# (ADR-006, ADR-017). Derived from the seed by default so CI and self-controlled
# targets need no manual sync; override the `backup-s3-access` / `backup-s3-secret`
# ids (via secretOverrides) to a real external account's keys for a prod off-site.
# Consumed by the CNPG Barman ObjectStore (postgres chart) and the rclone CronJob.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.backup.secretName }}
  labels:
    {{- toYaml $labels | nindent 4 }}
type: Opaque
stringData:
  ACCESS_KEY_ID: {{ include "ownsuite.getSecret" (dict "root" $ "id" "backup-s3-access" "length" 20) | quote }}
  ACCESS_SECRET_KEY: {{ include "ownsuite.getSecret" (dict "root" $ "id" "backup-s3-secret" "length" 40) | quote }}
  RCLONE_CRYPT_PASSWORD: {{ include "ownsuite.getSecret" (dict "root" $ "id" "rclone-crypt") | quote }}
{{- if .Values.backup.inCluster }}
---
# Internal credentials for the in-cluster off-site Garage (garage-backup), mirroring
# the primary garage-credentials. Derived from the seed (distinct ids).
# rpcSecret must be 32-byte hex (64 chars) — sha256 hex truncated to 64 is exactly that.
apiVersion: v1
kind: Secret
metadata:
  name: garage-backup-credentials
  labels:
    {{- toYaml $labels | nindent 4 }}
type: Opaque
stringData:
  rpcSecret: {{ include "ownsuite.getSecret" (dict "root" $ "id" "garage-backup-rpc" "length" 64) | quote }}
  adminToken: {{ include "ownsuite.getSecret" (dict "root" $ "id" "garage-backup-admin") | quote }}
{{- end }}
{{- end }}
{{- if .Values.garage.enabled }}
---
# Garage internal credentials (ADR-015): the RPC secret shared between nodes and
# the admin-API token. Injected into Garage via the GARAGE_RPC_SECRET /
# GARAGE_ADMIN_TOKEN env vars, so they never land in the committed garage.toml.
# rpcSecret must be 32-byte hex (64 chars) — sha256 hex truncated to 64 is exactly that.
apiVersion: v1
kind: Secret
metadata:
  name: garage-credentials
  labels:
    {{- toYaml $labels | nindent 4 }}
type: Opaque
stringData:
  rpcSecret: {{ include "ownsuite.getSecret" (dict "root" $ "id" "garage-rpc" "length" 64) | quote }}
  adminToken: {{ include "ownsuite.getSecret" (dict "root" $ "id" "garage-admin") | quote }}
{{- end }}
