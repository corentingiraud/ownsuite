{{- /*
Keycloak realm-import ConfigMap (ADR-005). Keycloak is started with
`--import-realm` and reads every *.json under /opt/keycloak/data/import, where
this ConfigMap is mounted. The realm and one OIDC client per enabled app are
built as data structures and serialized with toPrettyJson, so the client secret
is derived from the same seed/id the app uses — Keycloak and the app match with
no manual sync. Phase 1 ships the realm with no clients yet (apps arrive in
Phase 2 by appending to keycloak.clients).
*/ -}}
{{- /* UserInfo is kept UNSIGNED (user.info.response.signature.alg=""). RS256 makes Keycloak
       return a signed JWT that Grist's openid-client cannot parse; unsigned is the OIDC default
       every app here expects. Empty (not omitted) so a re-upsert clears any prior RS256. */}}
{{- $clients := list -}}
{{- range .Values.keycloak.clients }}
  {{- $secret := include "ownsuite.getSecret" (dict "root" $ "id" (printf "%s-oidc" .clientId)) -}}
  {{- $host := printf "%s.%s" .clientId $.Values.domain -}}
  {{- $client := dict
      "clientId" .clientId
      "name" .clientId
      "secret" $secret
      "enabled" true
      "protocol" "openid-connect"
      "publicClient" false
      "clientAuthenticatorType" "client-secret"
      "standardFlowEnabled" true
      "implicitFlowEnabled" false
      "directAccessGrantsEnabled" (.directAccessGrants | default false)
      "serviceAccountsEnabled" false
      "frontchannelLogout" true
      "redirectUris" (list (printf "https://%s/*" $host))
      "webOrigins" (list (printf "https://%s" $host))
      "defaultClientScopes" (list "web-origins" "acr" "roles" "profile" "email")
      "attributes" (dict
          "post.logout.redirect.uris" (printf "https://%s/*" $host)
          "user.info.response.signature.alg" "")
  -}}
  {{- $clients = append $clients $client -}}
{{- end }}
{{- /* Optional realm user for the e2e SSO check (CI only). Password derived from
       the seed (id "kc-test-user"); never committed in plaintext. */ -}}
{{- $users := list -}}
{{- if .Values.keycloak.seedTestUser.enabled }}
  {{- $pw := include "ownsuite.getSecret" (dict "root" $ "id" "kc-test-user") -}}
  {{- $user := dict
      "username" .Values.keycloak.seedTestUser.username
      "email" .Values.keycloak.seedTestUser.email
      "enabled" true
      "emailVerified" true
      "firstName" "Docs"
      "lastName" "Tester"
      "credentials" (list (dict "type" "password" "value" $pw "temporary" false))
  -}}
  {{- $users = append $users $user -}}
{{- end }}
{{- $realm := dict
    "realm" .Values.keycloak.realm
    "enabled" true
    "displayName" "OwnSuite"
    "sslRequired" "external"
    "registrationAllowed" false
    "clients" $clients
    "users" $users
-}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-import
  labels:
    app.kubernetes.io/managed-by: platform-configuration
data:
  {{ .Values.keycloak.realm }}-realm.json: |
{{ toPrettyJson $realm | indent 4 }}
