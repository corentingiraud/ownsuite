{{- if .Values.apps.meet.enabled }}
{{- /*
Meet (video conferencing) application secrets — derived from the single seed
(ADR-012) and consumed by the meet release via secretKeyRef. DJANGO_SECRET_KEY
signs Django sessions/CSRF; OIDC_RP_CLIENT_SECRET uses the same id ("meet-oidc")
as the Keycloak realm client (keycloak-realm-configmap / keycloak-config upsert
Job), so the app and Keycloak agree with no manual sync.

LIVEKIT_API_KEY / LIVEKIT_API_SECRET are the shared credential the meet backend,
the LiveKit server and the Egress recorder all authenticate with. LiveKit and
Egress take these values INLINE (their upstream charts render config into a
ConfigMap and support no secretKeyRef), so values/livekit*.yaml.gotmpl re-derive
them from the SAME ids — the values always match.

RECORDING_STORAGE_EVENT_TOKEN authenticates the Egress -> backend storage-event
callback that records where a room recording landed. The Redis URLs embed the
derived Valkey password and point at the shared in-cluster Valkey (db 6 = cache,
db 7 = Celery broker — distinct from Docs 0/1, Drive 2/3 and Messages 4/5).
*/}}
{{- $ns := .Release.Namespace -}}
{{- $valkeyPass := include "ownsuite.getSecret" (dict "root" $ "id" "valkey") -}}
{{- $valkeyHost := printf "valkey.%s.svc.cluster.local" $ns -}}
apiVersion: v1
kind: Secret
metadata:
  name: meet-secrets
  labels:
    app.kubernetes.io/managed-by: platform-configuration
    app.kubernetes.io/part-of: meet
type: Opaque
stringData:
  DJANGO_SECRET_KEY: {{ include "ownsuite.getSecret" (dict "root" $ "id" "meet-secret" "length" 50) | quote }}
  DJANGO_SUPERUSER_PASSWORD: {{ include "ownsuite.getSecret" (dict "root" $ "id" "meet-superuser") | quote }}
  # Must match the Keycloak realm client secret (same id, same default length).
  OIDC_RP_CLIENT_SECRET: {{ include "ownsuite.getSecret" (dict "root" $ "id" "meet-oidc") | quote }}
  # Shared LiveKit credential — re-derived inline in values/livekit*.yaml.gotmpl.
  LIVEKIT_API_KEY: {{ include "ownsuite.getSecret" (dict "root" $ "id" "meet-livekit-key" "length" 20) | quote }}
  LIVEKIT_API_SECRET: {{ include "ownsuite.getSecret" (dict "root" $ "id" "meet-livekit-secret" "length" 40) | quote }}
  RECORDING_STORAGE_EVENT_TOKEN: {{ include "ownsuite.getSecret" (dict "root" $ "id" "meet-recording-token" "length" 50) | quote }}
  REDIS_URL: {{ printf "redis://:%s@%s:6379/6" $valkeyPass $valkeyHost | quote }}
  CELERY_BROKER_URL: {{ printf "redis://:%s@%s:6379/7" $valkeyPass $valkeyHost | quote }}
{{- end }}
