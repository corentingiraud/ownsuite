{{- if .Values.apps.drive.enabled }}
{{- /*
Drive application secrets — all derived from the single seed (ADR-012) and
consumed by the Drive release via secretKeyRef. Mirrors docs-secrets.yaml so
derivation lives in one place: the OIDC client secret uses the same id
("drive-oidc") as the Keycloak realm client (keycloak-realm-configmap.yaml), so
Drive and Keycloak agree with no manual sync.

Drive shares the one in-cluster Valkey with Docs, so it uses DISTINCT Redis
databases (2 = cache, 3 = Celery broker) — Docs holds 0/1. A separate broker db
keeps the two apps' Celery queues from cross-consuming each other's tasks.
*/}}
{{- $ns := .Release.Namespace -}}
{{- $valkeyPass := include "ownsuite.getSecret" (dict "root" $ "id" "valkey") -}}
{{- $valkeyHost := printf "valkey.%s.svc.cluster.local" $ns -}}
apiVersion: v1
kind: Secret
metadata:
  name: drive-secrets
  labels:
    app.kubernetes.io/managed-by: platform-configuration
    app.kubernetes.io/part-of: drive
type: Opaque
stringData:
  DJANGO_SECRET_KEY: {{ include "ownsuite.getSecret" (dict "root" $ "id" "drive-django-secret" "length" 50) | quote }}
  DJANGO_SUPERUSER_PASSWORD: {{ include "ownsuite.getSecret" (dict "root" $ "id" "drive-superuser") | quote }}
  # Must match the Keycloak realm client secret (same id, same default length).
  OIDC_RP_CLIENT_SECRET: {{ include "ownsuite.getSecret" (dict "root" $ "id" "drive-oidc") | quote }}
  REDIS_URL: {{ printf "redis://:%s@%s:6379/2" $valkeyPass $valkeyHost | quote }}
  DJANGO_CELERY_BROKER_URL: {{ printf "redis://:%s@%s:6379/3" $valkeyPass $valkeyHost | quote }}
{{- end }}
