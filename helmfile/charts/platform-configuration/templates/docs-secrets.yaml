{{- if .Values.apps.docs.enabled }}
{{- /*
Docs (impress) application secrets — all derived from the single seed (ADR-012)
and consumed by the Docs release via secretKeyRef. Kept here so derivation lives
in one place: the OIDC client secret uses the same id ("docs-oidc") as the
Keycloak realm client (keycloak-realm-configmap.yaml), so Docs and Keycloak agree
with no manual sync. The Redis URLs embed the derived Valkey password and point
at the in-cluster Valkey service (db 0 = cache, db 1 = Celery broker).
*/}}
{{- $ns := .Release.Namespace -}}
{{- $valkeyPass := include "ownsuite.getSecret" (dict "root" $ "id" "valkey") -}}
{{- $valkeyHost := printf "valkey.%s.svc.cluster.local" $ns -}}
apiVersion: v1
kind: Secret
metadata:
  name: docs-secrets
  labels:
    app.kubernetes.io/managed-by: platform-configuration
    app.kubernetes.io/part-of: docs
type: Opaque
stringData:
  DJANGO_SECRET_KEY: {{ include "ownsuite.getSecret" (dict "root" $ "id" "docs-django-secret" "length" 50) | quote }}
  DJANGO_SUPERUSER_PASSWORD: {{ include "ownsuite.getSecret" (dict "root" $ "id" "docs-superuser") | quote }}
  # Must match the Keycloak realm client secret (same id, same default length).
  OIDC_RP_CLIENT_SECRET: {{ include "ownsuite.getSecret" (dict "root" $ "id" "docs-oidc") | quote }}
  # Shared secret between the Django backend and the y-provider collaboration
  # server — the same value is injected into both, under both names.
  COLLABORATION_SERVER_SECRET: {{ include "ownsuite.getSecret" (dict "root" $ "id" "docs-collaboration") | quote }}
  Y_PROVIDER_API_KEY: {{ include "ownsuite.getSecret" (dict "root" $ "id" "docs-collaboration") | quote }}
  REDIS_URL: {{ printf "redis://:%s@%s:6379/0" $valkeyPass $valkeyHost | quote }}
  DJANGO_CELERY_BROKER_URL: {{ printf "redis://:%s@%s:6379/1" $valkeyPass $valkeyHost | quote }}
{{- end }}
