{{- if .Values.apps.messages.enabled }}
{{- /*
Messages (mailbox) application secrets — derived from the single seed (ADR-012,
ADR-026) and consumed by the messages release via secretKeyRef. DJANGO_SECRET_KEY
signs Django sessions/CSRF; OIDC_RP_CLIENT_SECRET uses the same id ("messages-oidc")
as the Keycloak realm client (keycloak-realm-configmap / keycloak-config upsert Job),
so the app and Keycloak agree with no manual sync. MDA_API_SECRET is the HS256 key the
inbound MTA and the backend share to authenticate delivery. SMTP_INTERNAL_PASSWORD
authenticates the worker submitting outbound mail to mta-out (an in-cluster hop). The
home-DB password is the per-app `messages-db` Secret (from the databases list), not
duplicated here. The EXTERNAL relay credentials and the DKIM private key are captured
as overrides by the installer (ADR-026), not derived — they are wired in a later PR.
The Redis URLs embed the derived Valkey password and point at the shared in-cluster
Valkey (db 4 = cache, db 5 = Celery broker — distinct from Docs 0/1 and Drive 2/3).
*/}}
{{- $ns := .Release.Namespace -}}
{{- $valkeyPass := include "ownsuite.getSecret" (dict "root" $ "id" "valkey") -}}
{{- $valkeyHost := printf "valkey.%s.svc.cluster.local" $ns -}}
apiVersion: v1
kind: Secret
metadata:
  name: messages-secrets
  labels:
    app.kubernetes.io/managed-by: platform-configuration
    app.kubernetes.io/part-of: messages
type: Opaque
stringData:
  DJANGO_SECRET_KEY: {{ include "ownsuite.getSecret" (dict "root" $ "id" "messages-secret" "length" 50) | quote }}
  # Must match the Keycloak realm client secret (same id, same default length).
  OIDC_RP_CLIENT_SECRET: {{ include "ownsuite.getSecret" (dict "root" $ "id" "messages-oidc") | quote }}
  MDA_API_SECRET: {{ include "ownsuite.getSecret" (dict "root" $ "id" "messages-mda-api" "length" 50) | quote }}
  SMTP_INTERNAL_PASSWORD: {{ include "ownsuite.getSecret" (dict "root" $ "id" "messages-smtp-internal") | quote }}
  REDIS_URL: {{ printf "redis://:%s@%s:6379/4" $valkeyPass $valkeyHost | quote }}
  CELERY_BROKER_URL: {{ printf "redis://:%s@%s:6379/5" $valkeyPass $valkeyHost | quote }}
{{- end }}
