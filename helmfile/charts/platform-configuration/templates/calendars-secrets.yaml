{{- if .Values.apps.calendars.enabled }}
{{- /*
Calendars (shared calendars) application secrets — derived from the single seed
(ADR-012, ADR-043) and consumed by the calendars release via secretKeyRef.
DJANGO_SECRET_KEY signs Django sessions/CSRF; OIDC_RP_CLIENT_SECRET uses the same id
("calendars-oidc") as the Keycloak realm client (keycloak-realm-configmap / keycloak-config
upsert Job), so the app and Keycloak agree with no manual sync. SALT_KEY is the
django-fernet salt (any stable non-empty string; must not be empty). The three CALDAV_*
API keys authenticate the backend<->caldav internal API and must match byte-for-byte on
both sides — they do, both read this one Secret. The home-DB password is the per-app
`calendars-db` Secret (from the databases list), not duplicated here.

The Redis URLs embed the derived Valkey password and point at the shared in-cluster
Valkey — cache db 9, Dramatiq broker db 10, Dramatiq results db 11 (distinct from Docs
0/1, Drive 2/3, Messages 4/5, Meet 6/7 and LiveKit 8).
*/}}
{{- $ns := .Release.Namespace -}}
{{- $valkeyPass := include "ownsuite.getSecret" (dict "root" $ "id" "valkey") -}}
{{- $valkeyHost := printf "valkey.%s.svc.cluster.local" $ns -}}
{{- /* Messages integration (issue #108): the service-to-service credentials Calendars
   sends Messages (X-Channel-Id + X-API-Key) to read a user's mailboxes. Both sides read
   THIS one Secret so they agree byte-for-byte: the Calendars backend as env, and the
   Messages provisioning Job (which upserts the matching api_key Channel). Always derived
   when Calendars is on — harmless when Messages is off (the backend never sends them
   unless FEATURE_MESSAGES_INTEGRATION is set, which only happens when both apps are on).
   The channel id must be a valid UUID, so the 32 hex chars are dashed into 8-4-4-4-12. */ -}}
{{- $channelId := include "ownsuite.getSecret" (dict "root" $ "id" "calendars-messages-channel-id" "length" 32) -}}
{{- $channelUuid := regexReplaceAll "(.{8})(.{4})(.{4})(.{4})(.{12})" $channelId "${1}-${2}-${3}-${4}-${5}" -}}
{{- /* Messages integration, return path (issue #109): the CalDAV credential Messages
   presents to Calendars' /caldav Django proxy so a mailbox can see/accept invitations.
   The proxy (CalDAVProxyView) reads the HTTP-Basic password as channel_id(22)+token and
   verifies it against a GLOBAL type=caldav Channel row it upserts on the Calendars side
   (messages-caldav-provisioning Job). So the shared password IS the concatenation, and
   both halves are seed-derived here (ADR-012): CALDAV_CHANNEL_ID is a 22-char base64url
   string (hex from getSecret is valid base64url and urlsafe_to_uuid-decodes to the 16-byte
   channel pk); CALDAV_CHANNEL_TOKEN is the secret half. The Job reads the two halves to
   pin the row's pk (urlsafe_to_uuid(id)) + token; Messages reads only the assembled
   CALDAV_DEFAULT_PASSWORD. Always derived when Calendars is on — unused until Messages is
   also on (then messages.yaml wires the three CALDAV_DEFAULT_* vars). */ -}}
{{- $caldavChannelId := include "ownsuite.getSecret" (dict "root" $ "id" "calendars-caldav-channel-id" "length" 22) -}}
{{- $caldavChannelToken := include "ownsuite.getSecret" (dict "root" $ "id" "calendars-caldav-channel-token" "length" 50) -}}
apiVersion: v1
kind: Secret
metadata:
  name: calendars-secrets
  labels:
    app.kubernetes.io/managed-by: platform-configuration
    app.kubernetes.io/part-of: calendars
type: Opaque
stringData:
  DJANGO_SECRET_KEY: {{ include "ownsuite.getSecret" (dict "root" $ "id" "calendars-secret" "length" 50) | quote }}
  SALT_KEY: {{ include "ownsuite.getSecret" (dict "root" $ "id" "calendars-salt-key" "length" 50) | quote }}
  # Must match the Keycloak realm client secret (same id, same default length).
  OIDC_RP_CLIENT_SECRET: {{ include "ownsuite.getSecret" (dict "root" $ "id" "calendars-oidc") | quote }}
  CALDAV_OUTBOUND_API_KEY: {{ include "ownsuite.getSecret" (dict "root" $ "id" "calendars-caldav-outbound" "length" 50) | quote }}
  CALDAV_INBOUND_API_KEY: {{ include "ownsuite.getSecret" (dict "root" $ "id" "calendars-caldav-inbound" "length" 50) | quote }}
  CALDAV_INTERNAL_API_KEY: {{ include "ownsuite.getSecret" (dict "root" $ "id" "calendars-caldav-internal" "length" 50) | quote }}
  REDIS_URL: {{ printf "redis://:%s@%s:6379/9" $valkeyPass $valkeyHost | quote }}
  DRAMATIQ_BROKER_URL: {{ printf "redis://:%s@%s:6379/10" $valkeyPass $valkeyHost | quote }}
  DRAMATIQ_RESULT_BACKEND_URL: {{ printf "redis://:%s@%s:6379/11" $valkeyPass $valkeyHost | quote }}
  MESSAGES_CHANNEL_ID: {{ $channelUuid | quote }}
  MESSAGES_API_KEY: {{ include "ownsuite.getSecret" (dict "root" $ "id" "calendars-messages-api-key" "length" 50) | quote }}
  # CalDAV channel halves (Job reads these) + the assembled Basic-auth password (Messages
  # reads this one). channel_id(22) ++ token — see the block above (issue #109).
  CALDAV_CHANNEL_ID: {{ $caldavChannelId | quote }}
  CALDAV_CHANNEL_TOKEN: {{ $caldavChannelToken | quote }}
  CALDAV_DEFAULT_PASSWORD: {{ printf "%s%s" $caldavChannelId $caldavChannelToken | quote }}
{{- end }}
