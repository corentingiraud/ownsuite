{{- if .Values.apps.grist.enabled }}
{{- /*
Grist application secrets — derived from the single seed (ADR-012) and consumed by
the Grist release via secretKeyRef. GRIST_SESSION_SECRET signs Grist's session
cookies; the OIDC client secret uses the same id ("grist-oidc") as the Keycloak
realm client (keycloak-realm-configmap.yaml / keycloak-config upsert Job), so Grist
and Keycloak agree with no manual sync. The home-DB password is the per-app
`grist-db` Secret (from the databases list), not duplicated here.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: grist-secrets
  labels:
    app.kubernetes.io/managed-by: platform-configuration
    app.kubernetes.io/part-of: grist
type: Opaque
stringData:
  GRIST_SESSION_SECRET: {{ include "ownsuite.getSecret" (dict "root" $ "id" "grist-session" "length" 50) | quote }}
  # Must match the Keycloak realm client secret (same id, same default length).
  GRIST_OIDC_IDP_CLIENT_SECRET: {{ include "ownsuite.getSecret" (dict "root" $ "id" "grist-oidc") | quote }}
{{- end }}
