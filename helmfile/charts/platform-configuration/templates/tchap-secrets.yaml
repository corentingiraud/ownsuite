{{- if .Values.apps.tchap.enabled }}
{{- /*
Tchap (Matrix/Element) application secrets — derived from the single seed (ADR-012).
Unlike the other apps, Tchap's secret is not a flat env Secret: the ess-helm chart
loads whole homeserver.yaml / mas-config.yaml *fragments* from a Secret (its
additional.<name>.configSecret/configSecretKey mechanism), so credentials never land
in a ConfigMap. This Secret therefore holds two YAML documents:

  synapse-s3.yaml       synapse-s3-storage-provider config (bucket + endpoint + the
                        shared seed-derived S3 keys) — Synapse media on S3/Garage.
  mas-upstream-oidc.yaml MAS upstream_oauth2 -> Keycloak. The client_secret uses id
                        "tchap-oidc", the SAME id the Keycloak realm client derives
                        from (keycloak-realm-configmap / keycloak-config upsert), so
                        MAS and Keycloak agree with no manual sync. Note the Keycloak
                        clientId is "tchap"; "tchap-oidc" is only the derivation id.

Everything else Synapse/MAS need (signing key, macaroon/registration secrets, MAS
encryption + OAuth keys) is auto-generated by the chart's initSecrets — not here.
The two Postgres passwords live in the separate synapse-db / mas-db Secrets (from the
databases list), not duplicated here.

The S3 endpoint/region follow the same Garage-vs-external switch as meet.yaml.gotmpl.
MAS's own minijinja braces inside the templates MUST be wrapped in Helm raw-string
backticks ({{`...`}}) so Helm passes them through verbatim.
*/}}
{{- $ns := .Release.Namespace -}}
{{- $s3Endpoint := .Values.objectStorage.endpoint -}}
{{- $s3Region := .Values.objectStorage.region -}}
{{- if .Values.garage.enabled -}}
{{-   $s3Endpoint = printf "http://garage.%s.svc.cluster.local:3900" $ns -}}
{{-   $s3Region = .Values.garage.region -}}
{{- end -}}
{{- $s3Access := include "ownsuite.getSecret" (dict "root" $ "id" "s3-access") -}}
{{- $s3Secret := include "ownsuite.getSecret" (dict "root" $ "id" "s3-secret") -}}
{{- $oidcSecret := include "ownsuite.getSecret" (dict "root" $ "id" "tchap-oidc") -}}
{{- $issuer := printf "https://auth.%s/realms/%s" .Values.domain .Values.keycloak.realm -}}
apiVersion: v1
kind: Secret
metadata:
  name: tchap-secrets
  labels:
    app.kubernetes.io/managed-by: platform-configuration
    app.kubernetes.io/part-of: tchap
type: Opaque
stringData:
  synapse-s3.yaml: |
    media_storage_providers:
      - module: s3_storage_provider.S3StorageProviderBackend
        store_local: true
        store_remote: true
        store_synchronous: true
        config:
          bucket: {{ .Values.objectStorage.tchapBucket | quote }}
          region_name: {{ $s3Region | quote }}
          endpoint_url: {{ $s3Endpoint | quote }}
          access_key_id: '{{ $s3Access }}'
          secret_access_key: '{{ $s3Secret }}'
  mas-upstream-oidc.yaml: |
    upstream_oauth2:
      providers:
        # MAS requires a stable ULID as the provider id — it is baked into every
        # upstream link, so it must NOT change once users exist.
        - id: 01HQ8Z6M9K7P3T2V5W8Y4B6C0D
          issuer: {{ $issuer | quote }}
          human_name: Keycloak
          client_id: tchap
          client_secret: '{{ $oidcSecret }}'
          token_endpoint_auth_method: client_secret_basic
          scope: "openid email profile"
          claims_imports:
            # action: require = JIT-provision + fail the login loudly if email is absent
            # (our Keycloak always sends it under the "email" scope). MAS uses minijinja:
            # the localpart is the email's local part, lower-cased for a valid MXID.
            localpart:
              action: require
              template: "{{`{{ (user.email | split('@'))[0] | lower }}`}}"
            displayname:
              action: suggest
              template: "{{`{{ user.name }}`}}"
            email:
              action: suggest
              template: "{{`{{ user.email }}`}}"
{{- end }}
