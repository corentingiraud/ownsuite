{{- if .Values.apps.projects.enabled }}
{{- /*
Projects application secrets — derived from the single seed (ADR-012) and consumed
by the Projects release via secretKeyRef. SECRET_KEY signs sessions; the OIDC client
secret uses the same id ("projects-oidc") as the Keycloak realm client. Projects wants
a single DATABASE_URL connection string (Sails/Waterline), so — unlike the impress
apps that pass DB_PASSWORD by secretKeyRef — the password must be embedded in a URL;
we build it here from the same derived `projects-db` password the CNPG role gets
(id "projects-db", per secrets.yaml) so the two always match, and keep the whole URL
in this Secret rather than the rendered values. The derived password is sha256 hex
(URL-safe), so no escaping is needed.
*/}}
{{- $dbPass := include "ownsuite.getSecret" (dict "root" $ "id" "projects-db") -}}
{{- $dbUrl := printf "postgresql://projects:%s@%s:5432/projects" $dbPass .Values.postgres.host -}}
apiVersion: v1
kind: Secret
metadata:
  name: projects-secrets
  labels:
    app.kubernetes.io/managed-by: platform-configuration
    app.kubernetes.io/part-of: projects
type: Opaque
stringData:
  SECRET_KEY: {{ include "ownsuite.getSecret" (dict "root" $ "id" "projects-secret" "length" 50) | quote }}
  # Must match the Keycloak realm client secret (same id, same default length).
  OIDC_CLIENT_SECRET: {{ include "ownsuite.getSecret" (dict "root" $ "id" "projects-oidc") | quote }}
  DATABASE_URL: {{ $dbUrl | quote }}
{{- end }}
