---
# Defaults are overridden by Helmfile (values/platform-configuration.yaml.gotmpl),
# which feeds them from the environment. Listed here for `helm lint`/`helm template`
# to render the chart standalone.

# Single seed for deterministic secret derivation (ADR-012). Empty default keeps
# `helm lint` working; the real seed comes from $OWNSUITE_SECRET_SEED at sync time.
secretSeed: ""
# Explicit overrides, keyed by secret id.
secretOverrides: {}

domain: ownsuite.localhost

# Per-app toggles (gates app-specific secrets like docs-secrets).
apps:
  docs:
    enabled: true

# Databases whose owner password is derived and exposed as a basic-auth Secret.
databases:
  - name: keycloak
    secretName: keycloak-db
  - name: docs
    secretName: docs-db

keycloak:
  realm: ownsuite
  adminUser: admin
  # One OIDC client per app. Each entry: {clientId, directAccessGrants?}.
  clients:
    - clientId: docs
      directAccessGrants: false
  # Optional realm user seeded for the e2e SSO check (CI only).
  seedTestUser:
    enabled: false
    username: docs-tester
    email: docs-tester@example.org

# Object storage credentials are always derived (the pluggable seam, ADR-003).
objectStorage:
  secretName: s3-credentials
  endpoint: ""
  region: eu-west

# In-cluster Garage object store (ADR-015). When enabled, its internal RPC secret
# and admin token are derived here too, so all secret derivation stays in one place.
garage:
  enabled: false

# Off-site backup credentials (ADR-006, ADR-017). Derived by default so CI and
# self-controlled targets work with no manual sync; override the backup-s3-access /
# backup-s3-secret ids (via secretOverrides) to a real external account's keys.
# `rclone-crypt` is the passphrase for the rclone client-side encryption of objects.
backup:
  enabled: false
  secretName: backup-s3-credentials
  # When the off-site store is the in-cluster garage-backup (CI), derive its
  # internal Garage RPC secret + admin token too.
  inCluster: false

valkey:
  secretName: valkey-credentials
  # Secret consumed by the Valkey chart (extraSecretValkeyConfigs) to inject
  # `requirepass` without ever putting the password in a ConfigMap or the repo.
  configSecretName: valkey-extra-config
