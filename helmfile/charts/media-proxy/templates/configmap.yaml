{{- if .Values.enabled }}
{{- /*
nginx server block replicating the upstream apps' media auth_request contract on
Traefik. Mounted at /etc/nginx/conf.d/default.conf (the stock image's http{}/logging
wrapper is kept). Each location's auth subrequest sends X-Original-URL=$request_uri and
Host=$host (the public host, in DJANGO_ALLOWED_HOSTS) to the backend, which returns the
SigV4 headers; the download location then forwards those to the object store with the
endpoint as the upstream Host so the signature validates. Works for both the in-cluster
Garage (http) and an external S3 (https) — the values set s3Scheme/s3Host/s3HostHeader.

Most apps need a single /media/ path + one media-auth endpoint (docs, drive). Some
(meet) serve several path prefixes, each guarded by its own backend media-auth route,
so the config is driven by a `locations` list. When it is unset we synthesise a single
entry from the legacy authPath/mediaPath/forceDownload keys — identical to before.
*/}}
{{- $locations := .Values.locations | default (list (dict "path" (.Values.mediaPath | default "/media/") "authPath" .Values.authPath "forceDownload" .Values.forceDownload)) -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.app }}-media-proxy
  labels:
    app.kubernetes.io/managed-by: helm
    app.kubernetes.io/part-of: {{ .Values.app }}
data:
  default.conf: |
    server {
        listen 8080;
        server_name _;

        location = /healthz {
            return 200 "ok";
            add_header Content-Type text/plain;
        }
    {{- range $i, $loc := $locations }}

        # Authenticated media download: authorize, then proxy the signed request to S3.
        location {{ $loc.path }} {
            auth_request /media-auth-{{ $i }};
            auth_request_set $authHeader $upstream_http_authorization;
            auth_request_set $authDate $upstream_http_x_amz_date;
            auth_request_set $authContentSha256 $upstream_http_x_amz_content_sha256;

            proxy_set_header Authorization $authHeader;
            proxy_set_header X-Amz-Date $authDate;
            proxy_set_header X-Amz-Content-SHA256 $authContentSha256;

            # Map the request to the object key and send it to the store. nginx strips
            # the whole matched location prefix, so proxy_pass re-adds any part of it
            # that belongs to the S3 KEY via $loc.keyPrefix. It MUST equal the prefix the
            # backend signed the key with, or SigV4 fails -> 403.
            #   - meet: keys are recordings/<id>.mp4 and files/<id>.<ext>, so the
            #     /media/recordings//media/files/ locations set keyPrefix accordingly
            #     (issue #73 — without it the proxy requested <id>.mp4 and 403'd).
            #   - drive/docs: keyPrefix empty — /media/preview/<key> and /media/<key>
            #     both map to <bucket>/<key> (preview/ is a delivery marker, not a key).
            # The upstream Host MUST also match what the backend signed against (its
            # AWS_S3_ENDPOINT_URL), or the store rejects the signature.
            proxy_pass {{ $.Values.s3Scheme }}://{{ $.Values.s3Host }}:{{ $.Values.s3Port }}/{{ $.Values.bucket }}/{{ $loc.keyPrefix | default "" }};
            proxy_set_header Host {{ $.Values.s3HostHeader }};
            {{- if eq $.Values.s3Scheme "https" }}
            # External S3 over TLS: send SNI matching the signed host.
            proxy_ssl_server_name on;
            {{- end }}

            add_header Content-Security-Policy "default-src 'none'" always;
            {{- if $loc.forceDownload }}
            add_header Content-Disposition "attachment";
            {{- end }}
        }

        # Internal auth subrequest to the backend media-auth endpoint. The backend reads
        # the requested object from X-Original-URL (nginx convention) and authorizes the
        # session, then returns the SigV4 headers captured above.
        location = /media-auth-{{ $i }} {
            internal;
            proxy_pass http://{{ $.Values.authUpstream }}{{ $loc.authPath }};
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Host $host;
            proxy_set_header X-Original-URL $request_uri;
            proxy_set_header X-Original-Method $request_method;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    {{- end }}
    }
{{- end }}
