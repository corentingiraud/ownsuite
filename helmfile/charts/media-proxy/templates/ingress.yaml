{{- if .Values.enabled }}
{{- /* Traefik routes the media path(s) to the nginx proxy (no Traefik middlewares —
       nginx does the auth_request + signing + rewrite). More specific than the app's
       `/` route. One path per `locations` entry (defaults to a single /media/). */}}
{{- $locations := .Values.locations | default (list (dict "path" (.Values.mediaPath | default "/media/"))) -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.app }}-media-proxy
  labels:
    app.kubernetes.io/managed-by: helm
    app.kubernetes.io/part-of: {{ .Values.app }}
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - {{ .Values.host | quote }}
      secretName: {{ .Values.tlsSecret | quote }}
  rules:
    - host: {{ .Values.host | quote }}
      http:
        paths:
          {{- range $locations }}
          - path: {{ .path }}
            pathType: Prefix
            backend:
              service:
                name: {{ $.Values.app }}-media-proxy
                port:
                  number: 80
          {{- end }}
{{- end }}
