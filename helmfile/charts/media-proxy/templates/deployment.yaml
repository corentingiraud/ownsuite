{{- if .Values.garageMode }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app }}-media-proxy
  labels:
    app.kubernetes.io/managed-by: helm
    app.kubernetes.io/part-of: {{ .Values.app }}
    app.kubernetes.io/name: {{ .Values.app }}-media-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.app }}-media-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.app }}-media-proxy
      annotations:
        # Roll the pod when the nginx config changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: nginx
          image: {{ .Values.image | quote }}
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: conf
              mountPath: /etc/nginx/conf.d
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              memory: "64Mi"
      volumes:
        - name: conf
          configMap:
            name: {{ .Values.app }}-media-proxy
{{- end }}
