---
# Overridden by Helmfile (values/media-proxy-*.yaml.gotmpl). Listed for standalone
# `helm lint` / `helm template`.

# App this proxy serves (drive | docs) — names the Deployment/Service/Ingress.
app: drive
# Render the resources only when this app needs the proxy (in-cluster mode, or external
# S3 where the backend's media-auth contract still requires an nginx hop).
enabled: false

# nginx image (pinned in versions.yaml).
image: nginx:1.31.2-alpine

# Backend service the auth_request subrequest hits (shared across all locations).
authUpstream: drive-backend

# Single-location apps (docs, drive) set authPath + the optional mediaPath (defaults to
# /media/) and one forceDownload below. Multi-prefix apps (meet: recordings + files,
# each guarded by its own backend media-auth route) instead set a `locations` list —
# one entry per path, each with its own authPath + forceDownload, e.g.:
#   locations:
#     - { path: /media/recordings/, authPath: /api/v1.0/recordings/media-auth/, forceDownload: false }
#     - { path: /media/files/,      authPath: /api/v1.0/files/media-auth/,      forceDownload: true }
# When `locations` is unset a single entry is synthesised from authPath/mediaPath/forceDownload.
authPath: /api/v1.0/items/media-auth/

# Object-store bucket the /media/ path rewrites into, plus the scheme/host/port the
# signed request is proxied to. s3HostHeader MUST equal the host the backend signs
# against (AWS_S3_ENDPOINT_URL), or the SigV4 signature won't validate — for the
# in-cluster RustFS that is host:port (non-default port), for an external S3 over
# TLS it is the bare host (port 443 omitted, as boto3 signs it).
bucket: drive-media-storage
s3Scheme: http
s3Host: rustfs-svc.ownsuite.svc.cluster.local
s3Port: 9000
s3HostHeader: rustfs-svc.ownsuite.svc.cluster.local:9000

# Public host + TLS secret for the /media/ ingress (the cert is issued on the app's
# main ingress; reused here).
host: drive.example.org
tlsSecret: drive-tls

# Force a download (Content-Disposition: attachment). True for Drive (files), false
# for Docs (inline document images).
forceDownload: true
