{{- /*
Projects server (ADR-025, ADR-031). One container, one replica. File uploads
(avatars, project backgrounds, attachments) live on S3 via the app's S3FileManager
(activated by the S3_* env), so there is no PVC and no `strategy: Recreate`; the
database is external (CNPG, via DATABASE_URL). All credentials arrive by secretKeyRef
(secretEnv) — nothing secret is rendered here.
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: projects
  labels:
    app.kubernetes.io/name: projects
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: projects
  template:
    metadata:
      labels:
        app.kubernetes.io/name: projects
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: projects
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - name: http
              containerPort: {{ .Values.port }}
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- range .Values.secretEnv }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secretName }}
                  key: {{ .secretKey }}
            {{- end }}
          # TCP, not HTTP: the app enforces OIDC on every route, so there is no
          # unauthenticated 2xx endpoint to probe. startupProbe absorbs the first-boot
          # DB migration (≈5 min budget); readiness/liveness then run fast. Liveness
          # restarts a wedged pod that readiness alone would only pull from the Service.
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 20
            failureThreshold: 3
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
