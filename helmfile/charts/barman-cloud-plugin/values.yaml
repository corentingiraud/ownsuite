---
# The plugin is installed from a vendored upstream manifest (templates/plugin.yaml).
# The only value it needs is the plugin version, which drives the operator and sidecar
# image tags. It is the single source of truth in helmfile/versions/versions.yaml,
# injected by values/barman-cloud-plugin.yaml.gotmpl; the empty default keeps
# standalone `helm lint` working.
barmanCloudPlugin: ""
