---
# Pinned Helm chart versions and image tags for the OwnSuite shared infrastructure.
# Never use `latest` (AGENTS.md). Each pin is tracked by Renovate via the
# customManagers in renovate.json — the `# renovate:` comment above a value tells
# Renovate which datasource/registry/package to query. A bump is always an
# explicit, reviewable diff gated by CI (ADR-007).

chartVersions:
  # renovate: datasource=helm registryUrl=https://charts.jetstack.io depName=cert-manager
  certManager: "v1.20.2"
  # renovate: datasource=helm registryUrl=https://cloudnative-pg.github.io/charts depName=cloudnative-pg
  cnpgOperator: "0.28.3"
  # renovate: datasource=helm registryUrl=https://codecentric.github.io/helm-charts depName=keycloakx
  keycloakx: "7.2.0"
  # renovate: datasource=helm registryUrl=https://groundhog2k.github.io/helm-charts depName=valkey
  valkey: "2.3.0"
  # Docs (suitenumerique / impress) — official chart. The chart's appVersion is
  # "latest", so the impress image tags below are pinned independently.
  # renovate: datasource=helm registryUrl=https://suitenumerique.github.io/docs depName=docs
  docs: "5.3.0"
  # Drive (suitenumerique / drive) — official chart. Like docs, its appVersion is
  # "latest", so the drive image tags below are pinned independently.
  # renovate: datasource=helm registryUrl=https://suitenumerique.github.io/drive depName=drive
  drive: "0.19.0"

imageVersions:
  # renovate: datasource=docker depName=quay.io/keycloak/keycloak
  keycloak: "26.6.3"
  # Docs images — keep these three in lockstep with the chart appVersion.
  # renovate: datasource=docker depName=lasuite/impress-backend
  docsBackend: "v5.3.0"
  # renovate: datasource=docker depName=lasuite/impress-frontend
  docsFrontend: "v5.3.0"
  # renovate: datasource=docker depName=lasuite/impress-y-provider
  docsYProvider: "v5.3.0"
  # Drive images — keep these two in lockstep with the drive chart version above.
  # Drive is a file manager (no realtime y-provider, unlike Docs).
  # renovate: datasource=docker depName=lasuite/drive-backend
  driveBackend: "v0.19.0"
  # renovate: datasource=docker depName=lasuite/drive-frontend
  driveFrontend: "v0.19.0"
  # Grist (getgrist) — a single-container app (no official Helm chart), deployed
  # from the local ./charts/grist chart (ADR-024). One image; the Docker tag has no
  # "v" prefix (the grist-core GitHub release is tagged v1.7.15).
  # renovate: datasource=docker depName=gristlabs/grist
  grist: "1.7.15"
  # Projects (suitenumerique) — a single-container Sails.js app (no official Helm
  # chart), deployed from the local ./charts/projects chart (ADR-025).
  # renovate: datasource=docker depName=lasuite/projects
  projects: "1.27.10"
  # Messages (suitenumerique) — the mailbox (ADR-021, ADR-026). No official Helm
  # chart; the local ./charts/messages chart runs four images that share this one
  # tag: messages-{backend,frontend,mta-in,mta-out} on ghcr.io (the worker reuses
  # the backend image). Off by default.
  # renovate: datasource=docker depName=ghcr.io/suitenumerique/messages-backend
  messages: "0.8.0"
  # Garage object store (ADR-015), deployed from the local ./charts/garage chart.
  # renovate: datasource=docker depName=dxflrs/garage
  garage: "v2.3.0"
  # kubectl image used by the Garage bootstrap Job to exec the Garage CLI.
  # renovate: datasource=docker depName=alpine/kubectl
  kubectl: "1.36.2"
  # rclone image for the off-site object copy CronJob / restore Job (ADR-006/ADR-017).
  # renovate: datasource=docker depName=rclone/rclone
  rclone: "1.74.3"

# Vendored manifests pinned by version (not Helm charts or plain images). The
# referenced file is committed verbatim; a Renovate bump is a reminder to re-vendor.
manifestVersions:
  # CloudNativePG Barman Cloud Plugin (ADR-006/ADR-017). The release manifest is
  # vendored at charts/barman-cloud-plugin/templates/plugin.yaml; on a bump, replace
  # that file with the new release's manifest.yaml (the operator + sidecar images are
  # pinned inside it).
  # renovate: datasource=github-releases depName=cloudnative-pg/plugin-barman-cloud
  barmanCloudPlugin: "v0.13.0"
